<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Wallet</title>
    <style>
      /*
       * Pre-paint background — see popup.html for the full rationale.
       * Sidepanel takes the full browser side rail (no fixed width), so any
       * background leak around the app shell is more visible than in the popup.
       */
      * {
        margin: 0;
        box-sizing: border-box;
      }

      :root { color-scheme: light dark; }

      html { background: #FAFAFC; }
      html.theme-dark { background: #08080F; }

      @media (prefers-color-scheme: dark) {
        html:not(.theme-light) { background: #08080F; }
      }

      body {
        width: 100%;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: inherit;
        display: flex;
        justify-content: center;
      }

      #root {
        width: 100%;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./sidepanel.tsx"></script>
  </body>
</html>
