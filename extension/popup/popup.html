<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Wallet</title>
    <style>
      /*
       * Pre-paint background.
       *
       * Real theme tokens (--color-surface-secondary) ship via tailwind.css
       * inside an @layer, which loses to unlayered selectors. Rather than
       * fight the cascade we set a safe body bg here that matches whichever
       * theme we're about to render:
       *   - user's persisted preference wins via the `.theme-*` class
       *     React applies (usually within ~1 frame)
       *   - on the very first paint before JS runs, we fall back to
       *     prefers-color-scheme so dark-mode users don't see a light flash
       */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root { color-scheme: light dark; }

      html { background: #FAFAFC; }
      html.theme-dark { background: #08080F; }

      @media (prefers-color-scheme: dark) {
        html:not(.theme-light) { background: #08080F; }
      }

      body {
        width: 360px;
        min-height: 600px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: inherit;
      }

      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./popup.tsx"></script>
  </body>
</html>
